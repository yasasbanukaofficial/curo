name: Pulbish npm package

on:
  push:
    branches: [main]
    paths:
      - "packages/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Installing dependencies
        working-directory: packages
        run: pnpm install --frozen-lockfile

      - name: Building package
        working-directory: packages
        run: pnpm --filter curo-cli run build

      - name: Publishing the package
        working-directory: packages
        run: pnpm --filter curo-cli publish --no-git-checks
